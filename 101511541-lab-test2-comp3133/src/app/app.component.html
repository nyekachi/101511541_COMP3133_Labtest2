<mat-toolbar class="app-toolbar">
  <div class="toolbar-inner">
    <div class="logo" routerLink="/">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">Wizarding World</span>
    </div>
    <nav class="nav-links">
      <button mat-button routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">

      </button>
      <button mat-button routerLink="/filter" routerLinkActive="active-link">
        <mat-icon>filter_list</mat-icon> Filter by House

    </nav>
  </div>
</mat-toolbar>

<main class="app-main">
  <router-outlet></router-outlet>
</main>
